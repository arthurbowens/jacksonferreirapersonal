<div class="min-h-screen bg-[#0b0f14]" id="sobre" [ngClass]="{ 'layout-with-sidebar': !embedded }">
  <app-header *ngIf="!embedded"></app-header>
  
  <section class="pt-20 pb-20 bg-[#0b0f14]">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <h1 class="text-4xl md:text-5xl font-bold text-white mb-6 text-center">
        Quem vai fazer sua pagina
      </h1>
      <div class="bg-[#111827] rounded-3xl border border-[#1f2937] p-8 md:p-10">
        <p class="text-xl text-gray-300 leading-relaxed mb-6">
          Eu trabalho criando paginas simples focadas em trazer alunos direto pro WhatsApp.
        </p>
        <p class="text-lg text-white leading-relaxed">
          A ideia e tirar de voce o tempo perdido explicando tudo no direct e te ajudar a fechar mais alunos com um processo mais organizado.
        </p>
      </div>
      <p class="text-center text-[#32C787] font-semibold mt-6">
        Ideal para personal que vende consultoria online
      </p>
    </div>
  </section>

  <app-footer *ngIf="!embedded"></app-footer>
</div>
