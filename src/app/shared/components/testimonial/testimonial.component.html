<div class="bg-white rounded-xl shadow-lg p-6 border border-gray-100 hover:shadow-xl transition-all duration-300">
  <!-- Avaliação -->
  <div class="flex items-center mb-4">
    <div class="flex space-x-1">
      <span *ngFor="let star of getStarsArray()" class="text-yellow-400 text-lg">★</span>
    </div>
  </div>

  <!-- Depoimento -->
  <blockquote class="text-gray-700 mb-6 leading-relaxed">
    "{{ testimonial.content }}"
  </blockquote>

  <!-- Autor -->
  <div class="flex items-center">
    <div class="w-12 h-12 rounded-full bg-primary-100 flex items-center justify-center mr-4">
      <span class="text-primary-600 font-semibold text-lg">
        {{ testimonial.name.charAt(0) }}
      </span>
    </div>
    <div>
      <h4 class="font-semibold text-gray-900">{{ testimonial.name }}</h4>
      <p class="text-sm text-gray-600">{{ testimonial.role }}</p>
      <p class="text-sm text-primary-600 font-medium">{{ testimonial.company }}</p>
    </div>
  </div>
</div>
