<div class="bg-[#111827] rounded-xl shadow-lg p-6 border border-[#1f2937] hover:shadow-xl transition-all duration-300">
  <!-- Avaliação -->
  <div class="flex items-center mb-4">
    <div class="flex space-x-1">
      <span *ngFor="let star of getStarsArray()" class="text-[#32C787] text-lg">★</span>
    </div>
  </div>

  <!-- Depoimento -->
  <blockquote class="text-gray-300 mb-6 leading-relaxed">
    "{{ testimonial.content }}"
  </blockquote>

  <!-- Autor -->
  <div class="flex items-center">
    <div class="w-12 h-12 rounded-full bg-[#0f172a] flex items-center justify-center mr-4 border border-[#1f2937]">
      <span class="text-[#32C787] font-semibold text-lg">
        {{ testimonial.name.charAt(0) }}
      </span>
    </div>
    <div>
      <h4 class="font-semibold text-white">{{ testimonial.name }}</h4>
      <p class="text-sm text-gray-400">{{ testimonial.role }}</p>
      <p class="text-sm text-[#32C787] font-medium">{{ testimonial.company }}</p>
    </div>
  </div>
</div>
