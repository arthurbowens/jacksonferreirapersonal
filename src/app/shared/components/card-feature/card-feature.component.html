<div class="group bg-dark-800 rounded-3xl p-8 hover:bg-dark-700 transition-all duration-500 border border-dark-600 hover:border-primary-500/30 hover:shadow-2xl hover:shadow-primary-500/10 relative overflow-hidden h-full flex flex-col"
     [class.ring-2]="feature.highlight"
     [class.ring-primary-500]="feature.highlight"
     [class.bg-gradient-to-br]="feature.highlight"
     [class.from-dark-800]="feature.highlight"
     [class.to-dark-700]="feature.highlight">
  
  <!-- Background Pattern -->
  <div class="absolute top-0 right-0 w-32 h-32 opacity-5 group-hover:opacity-10 transition-opacity duration-500">
    <div class="w-full h-full bg-gradient-to-br from-primary-400 to-accent-400 rounded-full blur-2xl"></div>
  </div>
  
  <!-- Ícone -->
  <div class="flex items-center justify-center w-16 h-16 rounded-2xl mb-6 relative z-10 transition-all duration-300 group-hover:scale-110"
       [class.bg-gradient-to-br]="feature.highlight"
       [class.from-primary-500]="feature.highlight"
       [class.to-primary-600]="feature.highlight"
       [class.bg-gradient-to-br]="!feature.highlight"
       [class.from-dark-700]="!feature.highlight"
       [class.to-dark-600]="!feature.highlight">
    <lucide-icon [name]="feature.icon" [size]="28" 
                 [class.text-white]="feature.highlight"
                 [class.text-gray-300]="!feature.highlight"
                 class="group-hover:scale-110 transition-transform duration-300"></lucide-icon>
  </div>

  <!-- Título -->
  <h3 class="text-2xl font-bold text-white mb-4 relative z-10 group-hover:text-primary-100 transition-colors duration-300 min-h-[56px]">
    {{ feature.title }}
  </h3>

  <!-- Descrição -->
  <p class="text-gray-300 leading-relaxed text-lg relative z-10 group-hover:text-gray-200 transition-colors duration-300 min-h-[72px]">
    {{ feature.description }}
  </p>

  <div class="flex-1"></div>

  <!-- Badge de destaque -->
  <div *ngIf="feature.highlight" 
       class="mt-6 inline-flex items-center px-4 py-2 rounded-full text-sm font-semibold bg-gradient-to-r from-primary-500/20 to-accent-500/20 text-primary-300 border border-primary-500/30 backdrop-blur-sm">
    <lucide-icon [name]="'star'" [size]="16" class="mr-2 text-yellow-400 fill-current"></lucide-icon>
    Mais Popular
  </div>

  <!-- Hover Effect -->
  <div class="absolute inset-0 bg-gradient-to-r from-primary-500/5 to-accent-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-3xl"></div>
</div>
