<!-- Desktop Sidebar -->
<aside class="hidden lg:flex fixed left-0 top-0 h-screen bg-[#0f141b] border-r border-[#1f2937] z-50 shadow-soft transition-all duration-300 overflow-hidden"
       [class.w-72]="isSidebarOpen"
       [class.w-20]="!isSidebarOpen">
  <div class="w-full flex flex-col transition-all duration-300"
       [class.p-6]="isSidebarOpen"
       [class.p-3]="!isSidebarOpen">
    <div class="relative flex items-center mb-8">
      <a routerLink="/"
         class="flex items-center group min-w-0"
         [class.justify-center]="!isSidebarOpen"
         [class.justify-start]="isSidebarOpen"
         [class.w-full]="true"
         [class.pr-10]="isSidebarOpen">
        <img *ngIf="isSidebarOpen"
             src="assets/images/logo-impulso-personal.svg"
             alt="ImpulsoDigital Logo"
             class="object-contain group-hover:scale-[1.02] transition-transform duration-300 w-[200px] h-[56px]">
        <img *ngIf="!isSidebarOpen"
             src="assets/images/logo-impulso-mark.svg"
             alt="ImpulsoDigital Mark"
             class="object-contain w-10 h-10">
      </a>
      <button (click)="toggleSidebar()"
              class="absolute top-1/2 -translate-y-1/2 -right-3 rounded-full border border-[#374151] bg-[#111827] text-white hover:text-[#32C787] hover:border-[#32C787] w-7 h-7 flex items-center justify-center shadow-sm transition-all duration-200 focus:outline-none"
              [attr.aria-label]="isSidebarOpen ? 'Fechar sidebar' : 'Abrir sidebar'">
        <span class="text-base leading-none font-semibold">{{ isSidebarOpen ? '‹' : '›' }}</span>
      </button>
    </div>

    <nav class="flex flex-col gap-2">
      <a routerLink="/" fragment="home" routerLinkActive="text-white"
         class="text-gray-200 hover:text-[#32C787] py-3 text-sm font-semibold rounded-xl transition-all duration-200 relative group flex items-center"
         [class.px-4]="isSidebarOpen"
         [class.px-0]="!isSidebarOpen"
         [class.justify-start]="isSidebarOpen"
         [class.justify-center]="!isSidebarOpen"
         [attr.title]="!isSidebarOpen ? 'Home' : null">
        <lucide-icon [name]="'house'" [size]="18"></lucide-icon>
        <span [class.hidden]="!isSidebarOpen">Home</span>
        <span *ngIf="isSidebarOpen" class="absolute left-4 right-4 -bottom-0.5 h-px bg-[#32C787] scale-x-0 group-hover:scale-x-100 transition-transform duration-200 origin-left"></span>
      </a>
      <a routerLink="/" fragment="funcionalidades" routerLinkActive="text-white"
         class="text-gray-200 hover:text-[#32C787] py-3 text-sm font-semibold rounded-xl transition-all duration-200 relative group flex items-center"
         [class.px-4]="isSidebarOpen"
         [class.px-0]="!isSidebarOpen"
         [class.justify-start]="isSidebarOpen"
         [class.justify-center]="!isSidebarOpen"
         [attr.title]="!isSidebarOpen ? 'Funcionalidades' : null">
        <lucide-icon [name]="'zap'" [size]="18"></lucide-icon>
        <span [class.hidden]="!isSidebarOpen">Funcionalidades</span>
        <span *ngIf="isSidebarOpen" class="absolute left-4 right-4 -bottom-0.5 h-px bg-[#32C787] scale-x-0 group-hover:scale-x-100 transition-transform duration-200 origin-left"></span>
      </a>
      <a routerLink="/" fragment="sobre" routerLinkActive="text-white"
         class="text-gray-200 hover:text-[#32C787] py-3 text-sm font-semibold rounded-xl transition-all duration-200 relative group flex items-center"
         [class.px-4]="isSidebarOpen"
         [class.px-0]="!isSidebarOpen"
         [class.justify-start]="isSidebarOpen"
         [class.justify-center]="!isSidebarOpen"
         [attr.title]="!isSidebarOpen ? 'Sobre' : null">
        <lucide-icon [name]="'users'" [size]="18"></lucide-icon>
        <span [class.hidden]="!isSidebarOpen">Sobre</span>
        <span *ngIf="isSidebarOpen" class="absolute left-4 right-4 -bottom-0.5 h-px bg-[#32C787] scale-x-0 group-hover:scale-x-100 transition-transform duration-200 origin-left"></span>
      </a>
      <a routerLink="/" fragment="contato" routerLinkActive="text-white"
         class="text-gray-200 hover:text-[#32C787] py-3 text-sm font-semibold rounded-xl transition-all duration-200 relative group flex items-center"
         [class.px-4]="isSidebarOpen"
         [class.px-0]="!isSidebarOpen"
         [class.justify-start]="isSidebarOpen"
         [class.justify-center]="!isSidebarOpen"
         [attr.title]="!isSidebarOpen ? 'Contato' : null">
        <lucide-icon [name]="'message-circle'" [size]="18"></lucide-icon>
        <span [class.hidden]="!isSidebarOpen">Contato</span>
        <span *ngIf="isSidebarOpen" class="absolute left-4 right-4 -bottom-0.5 h-px bg-[#32C787] scale-x-0 group-hover:scale-x-100 transition-transform duration-200 origin-left"></span>
      </a>
    </nav>

    <div class="mt-auto pt-6">
      <a routerLink="/" fragment="contato"
         class="bg-[#32C787] text-white rounded-xl font-semibold text-sm hover:bg-[#2DB378] transition-all duration-300 shadow-md hover:shadow-lg flex items-center justify-center gap-2 group"
         [class.px-6]="isSidebarOpen"
         [class.py-3.5]="isSidebarOpen"
         [class.px-0]="!isSidebarOpen"
         [class.py-0]="!isSidebarOpen"
         [class.w-12]="!isSidebarOpen"
         [class.h-12]="!isSidebarOpen"
         [attr.title]="!isSidebarOpen ? 'Quero Conhecer' : null">
        <lucide-icon [name]="'arrow-right'" [size]="16" class="group-hover:translate-x-1 transition-transform duration-200"></lucide-icon>
        <span [class.hidden]="!isSidebarOpen">Quero Conhecer</span>
      </a>
    </div>
  </div>
</aside>

<!-- Mobile Header -->
<header class="lg:hidden fixed top-0 left-0 right-0 z-50 bg-[#0f141b]/95 backdrop-blur-md border-b border-[#1f2937] menu-container">
  <nav class="px-4 sm:px-6">
    <div class="h-16 flex items-center justify-between">
      <a routerLink="/" class="flex items-center">
        <img src="assets/images/logo-impulso-personal.svg" alt="ImpulsoDigital Logo" class="w-48 h-11 object-contain">
      </a>

      <button type="button"
              (click)="toggleMenu($event)"
              class="text-gray-200 hover:text-[#32C787] focus:outline-none rounded-xl bg-[#111827] border border-[#1f2937] hover:border-[#32C787]/50 transition-all duration-200 w-12 h-12 flex items-center justify-center">
        <lucide-icon [name]="isMenuOpen ? 'x' : 'menu'" [size]="24"></lucide-icon>
      </button>
    </div>

    <div *ngIf="isMenuOpen" class="pb-4 pt-3 space-y-2 border-t border-[#1f2937]">
        <a routerLink="/" fragment="home" (click)="closeMenu()"
           class="text-gray-100 hover:text-[#32C787] bg-[#111827] block px-4 py-3.5 text-base font-semibold rounded-xl transition-all duration-200 min-h-[48px]">
          Home
        </a>
        <a routerLink="/" fragment="funcionalidades" (click)="closeMenu()"
           class="text-gray-100 hover:text-[#32C787] bg-[#111827] block px-4 py-3.5 text-base font-semibold rounded-xl transition-all duration-200 min-h-[48px]">
          Funcionalidades
        </a>
        <a routerLink="/" fragment="sobre" (click)="closeMenu()"
           class="text-gray-100 hover:text-[#32C787] bg-[#111827] block px-4 py-3.5 text-base font-semibold rounded-xl transition-all duration-200 min-h-[48px]">
          Sobre
        </a>
        <a routerLink="/" fragment="contato" (click)="closeMenu()"
           class="text-gray-100 hover:text-[#32C787] bg-[#111827] block px-4 py-3.5 text-base font-semibold rounded-xl transition-all duration-200 min-h-[48px]">
          Contato
        </a>
        <a routerLink="/" fragment="contato" (click)="closeMenu()"
           class="bg-[#32C787] text-white block px-5 py-4 text-base font-bold rounded-xl mt-3 text-center shadow-md hover:shadow-lg transition-all duration-300 hover:bg-[#2DB378] min-h-[50px]">
          Quero Conhecer
        </a>
    </div>
  </nav>
</header>
